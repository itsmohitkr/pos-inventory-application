name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Client Dependencies
        run: cd client && npm ci

      - name: Install Server Dependencies
        run: cd server && npm ci

      # 1. LINTING
      - name: Lint Client
        run: cd client && npm run lint
      
      # 2. PRISMA & DATABASE INTEGRITY
      - name: Validate Prisma Schema
        run: |
          cd server
          echo "DATABASE_URL=\"file:./test.db\"" > .env
          npx prisma validate
          # This checks if the schema has changes that are NOT in migrations
          npx prisma migrate diff --from-migrations ./prisma/migrations --to-schema-datamodel ./prisma/schema.prisma --exit-code

      # 3. UNIT TESTS & COVERAGE
      - name: Run Server Unit Tests & Coverage
        run: |
          cd server
          npx prisma migrate deploy
          npm run test:coverage

      - name: Run Client Unit Tests
        run: cd client && npm run test:unit

      # 4. BUILD VERIFICATION
      - name: Build Client
        run: cd client && npm run build

      # 5. E2E TESTS
      - name: Install Playwright Browsers
        run: cd client && npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: cd client && npx playwright test --project=chromium
        env:
          DATABASE_URL: "file:../server/test.db"

      # 6. ARTIFACTS & REPORTS
      - name: Upload Server Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage-report
          path: server/coverage
          retention-days: 30

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            client/playwright-report
            client/test-results
          retention-days: 30
