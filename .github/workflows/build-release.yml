name: Build and Release POS Application

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Quality Gate ────────────────────────────────────────────
  # Runs server + client tests before allowing build/release
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Server Tests ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: server
        run: npx prisma generate

      - name: Validate Prisma Migrations
        working-directory: server
        # This checks if the schema has changes that are NOT in migrations
        run: npx prisma migrate diff --from-migrations ./prisma/migrations --to-schema-datamodel ./prisma/schema.prisma --exit-code
        env:
          DATABASE_URL: "file:./test.db"

      - name: Run server tests
        working-directory: server
        run: npm test

      # ── Client Tests ──
      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint client
        working-directory: client
        run: npm run lint

      - name: Build client
        working-directory: client
        run: npm run build

  # ── macOS Build ─────────────────────────────────────────────
  build-mac:
    needs: quality-gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update version
        run: npm version 1.0.${{ github.run_number }} --no-git-tag-version

      - name: Install root dependencies
        run: npm ci

      - name: Set executable permissions for app-builder
        run: chmod +x node_modules/app-builder-bin/mac/app-builder_arm64

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build client
        working-directory: client
        run: npx vite build

      - name: Generate Prisma Client
        run: npx prisma generate --schema=server/prisma/schema.prisma

      - name: Build Electron app (mac)
        run: npm run electron-build

      - name: Package mac installer
        run: npm run electron-pack -- --mac

      - name: Upload mac installer
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            dist/*.dmg
            dist/latest-mac.yml

  # ── Windows Build ───────────────────────────────────────────
  build-win:
    needs: quality-gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update version
        run: npm version 1.0.${{ github.run_number }} --no-git-tag-version

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build client
        working-directory: client
        run: npx vite build

      - name: Generate Prisma Client
        run: npx prisma generate --schema=server/prisma/schema.prisma

      - name: Build Electron app (win)
        run: npm run electron-build

      - name: Package windows installer
        run: npm run electron-pack -- --win

      - name: Upload windows installer
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: |
            dist/*.exe
            dist/latest.yml

  # ── Release ─────────────────────────────────────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download mac installer
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: dist/

      - name: Download windows installer
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: dist/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.exe
            dist/latest.yml
            dist/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
