<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Trovix - Starting Up</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #0b1a30;
        /* Blue background */
        color: white;
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        overflow: hidden;
      }

      .logo-container {
        margin-bottom: 30px;
        animation: pulse 2s infinite ease-in-out;
      }

      .logo {
        width: 120px;
        height: 120px;
        object-fit: contain;
        filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.4));
      }

      h1 {
        margin: 0 0 10px 0;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0.5px;
      }

      .version-text {
        font-size: 13px;
        color: #7dd3fc;
        margin-bottom: 5px;
        font-weight: 500;
        letter-spacing: 0.5px;
        opacity: 0.9;
      }

      .status-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 20px;
      }

      .status-text {
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 12px;
      }

      /* Horizontal progress bar animator */
      .progress-bar-container {
        width: 250px;
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }

      .progress-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 30%;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
        border-radius: 4px;
        animation: progress 1.5s infinite ease-in-out;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }

        50% {
          transform: scale(1.05);
        }

        100% {
          transform: scale(1);
        }
      }

      @keyframes progress {
        0% {
          left: -30%;
          width: 30%;
        }

        50% {
          width: 60%;
        }

        100% {
          left: 100%;
          width: 30%;
        }
      }
    </style>
  </head>

  <body>
    <div class="logo-container">
      <img
        src="../../assets/shop_logo.png"
        class="logo"
        alt="App Logo"
      />
    </div>
    <h1>Trovix</h1>
    <p style="margin: 0 0 16px; font-size: 13px; letter-spacing: 0.5px; color: rgba(255,255,255,0.55); font-weight: 400;">Where Retail Meets Intelligence</p>
    <div class="version-text" id="versionMsg">Loading Version...</div>
    <div class="status-container">
      <div class="status-text" id="statusMsg">Starting local database engine...</div>
      <div class="progress-bar-container">
        <div class="progress-bar"></div>
      </div>
    </div>

    <script>
      // Listen for status updates from main process via IPC
      const { ipcRenderer } = require('electron');
      ipcRenderer.on('splash-status', (event, message) => {
        document.getElementById('statusMsg').innerText = message;
      });

      ipcRenderer.on('splash-version', (event, version) => {
        document.getElementById('versionMsg').innerText = `Version ${version}`;
      });
    </script>
  </body>
</html>
